<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquête ISPITSA - Chutes Personnes Âgées</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Facteurs associés aux chutes chez les personnes âgées</h1>
            <p>ISPITSA | Période : 2026</p>
        </div>
    </header>

    <main class="container">
        <form id="data-form" name="enquete-v3-finale" method="POST" data-netlify="true">
            <input type="hidden" name="form-name" value="enquete-v3-finale" />

            <fieldset>
                <legend>Données sociodémographiques</legend>
                <div class="form-group">
                    <label>1. Lieu de collecte *</label>
                    <select name="V1_Lieu" required><option value="Hopital">Hôpital</option><option value="Centre de sante">Centre de santé</option></select>
                </div>
                <div class="form-group">
                    <label>2. Âge *</label>
                    <input type="number" name="V2_Age" min="65" required>
                </div>
                <div class="form-group">
                    <label>3. Sexe *</label>
                    <select name="V3_Sexe" required><option value="Homme">Homme</option><option value="Femme">Femme</option></select>
                </div>
                <div class="form-group">
                    <label>4. Situation matrimoniale</label>
                    <select name="V4_Matrimoniale"><option value="Celibataire">Célibataire</option><option value="Marie">Marié(e)</option><option value="Veuf">Veuf(ve)</option><option value="Divorce">Divorcé(e)</option></select>
                </div>
                <div class="form-group">
                    <label>5. Niveau d'instruction</label>
                    <select name="V5_Instruction"><option value="Analphabete">Analphabète</option><option value="Primaire">Primaire</option><option value="Secondaire">Secondaire</option><option value="Superieur">Supérieur</option></select>
                </div>
                <div class="form-group">
                    <label>9. Avec qui vivez-vous ?</label>
                    <select name="V9_Vie_Seul"><option value="Seul">Seul(e)</option><option value="Famille">Famille</option><option value="Autre">Autre</option></select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Antécédents de chutes</legend>
                <div class="form-group">
                    <label>11. Aide à la marche ?</label>
                    <select name="V11_Aide"><option value="Non">Non</option><option value="Oui">Oui</option></select>
                </div>
                <div class="form-group">
                    <label>14. Chute au cours des 12 derniers mois ?</label>
                    <select name="V14_Chute_12m"><option value="Non">Non</option><option value="Oui">Oui</option></select>
                </div>
                <div class="form-group">
                    <label>15. Nombre de chutes</label>
                    <input type="number" name="V15_Nb_Chutes" min="0">
                </div>
                <div class="form-group">
                    <label>16. État de conscience lors de la chute</label>
                    <select name="V16_Conscience">
                        <option value="Conscient">Conscient</option>
                        <option value="Perte de connaissance">Perte de connaissance</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>17. Lieu de la chute</label>
                    <select name="V17_Lieu_Chute"><option value="Domicile">Domicile</option><option value="Exterieur">Extérieur</option></select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Autonomie fonctionnelle (ADL)</legend>
                <div class="grid-2">
                    <label>Toilette <input type="number" class="score-adl" name="V20" min="0" max="1" value="1"></label>
                    <label>Habillage <input type="number" class="score-adl" name="V21" min="0" max="1" value="1"></label>
                    <label>Alimentation <input type="number" class="score-adl" name="V22" min="0" max="1" value="1"></label>
                    <label>Transferts <input type="number" class="score-adl" name="V23" min="0" max="1" value="1"></label>
                    <label>Continence <input type="number" class="score-adl" name="V24" min="0" max="1" value="1"></label>
                    <label>Déplacement <input type="number" class="score-adl" name="V25" min="0" max="1" value="1"></label>
                </div>
                <div class="score-box">Score ADL : <span id="val-adl">6</span>/6</div>
                <input type="hidden" name="V26_Total_ADL" id="V26">
            </fieldset>

            <fieldset>
                <legend>Peur de tomber (FES-I)</legend>
                <div class="form-group"><label>Se lever d'une chaise (V27)</label><input type="number" class="score-fes" name="V27" min="1" max="4" value="1"></div>
                <div class="form-group"><label>S'habiller (V28)</label><input type="number" class="score-fes" name="V28" min="1" max="4" value="1"></div>
                <div class="form-group"><label>Douche (V29)</label><input type="number" class="score-fes" name="V29" min="1" max="4" value="1"></div>
                <div class="score-box">Score FES-I : <span id="val-fes">3</span></div>
                <input type="hidden" name="V34_Total_FES" id="V34">
            </fieldset>

            <fieldset>
                <legend>Environnement et Santé</legend>
                <label><input type="checkbox" name="V36"> Sol glissant</label><br>
                <label><input type="checkbox" name="V37"> Éclairage insuffisant</label><br>
                <label><input type="checkbox" name="V42"> Plus de 3 médicaments/jour</label><br>
                <label><input type="checkbox" name="V43"> Maladies chroniques</label>
            </fieldset>

            <fieldset>
                <legend>Évaluation Gériatrique (Vision / Audition)</legend>
                <div class="form-group">
                    <label>45. Acuité visuelle (Monoyer)</label>
                    <select name="V45_Vision">
                        <option value="Normale">≥ 8/10 (Normale)</option>
                        <option value="Baisse"> < 8/10 (Baisse)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>46. Port de lunettes ?</label>
                    <select name="V46_Lunettes"><option value="Oui">Oui</option><option value="Non">Non</option></select>
                </div>
                <div class="form-group">
                    <label>47. Difficultés avec obstacles ?</label>
                    <select name="V47_Obstacles"><option value="Non">Non</option><option value="Oui">Oui</option></select>
                </div>
                <div class="form-group">
                    <label>48. Examen ophtalmo < 12 mois ?</label>
                    <select name="V48_Examen">
                        <option value="Oui">Oui</option>
                        <option value="Non">Non</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>49. Troubles auditifs ?</label>
                    <select name="V49_Audition">
                        <option value="Non">Non (Audition normale)</option>
                        <option value="Oui">Oui (Troubles auditifs)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>50. Perte d'appétit ?</label>
                    <select name="V50_Appetit"><option value="Non">Non</option><option value="Oui">Oui</option></select>
                </div>
                <div class="form-group">
                    <label>51. Perte de poids ?</label>
                    <select name="V51_Poids"><option value="Non">Non</option><option value="Oui">Oui</option></select>
                </div>
            </fieldset>

            <button type="submit" class="btn">Envoyer le Questionnaire</button>
        </form>
        <div id="response-msg"></div>
    </main>
    <script src="script.js"></script>
</body>
</html>
