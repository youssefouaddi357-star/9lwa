<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>Welcome to My Site</h1>
            <p>I'm glad you're here!</p>
        </div>
    </header>

    <main class="container">
        <section id="about">
            <h2>About Me</h2>
            <p>Hello! I'm building this site to learn more about my visitors. Please fill out the questionnaire below.</p>
        </section>

        <section id="questionnaire">
            <h2>Questionnaire</h2>
            <form id="data-form" name="contact" method="POST" data-netlify="true">
                <input type="hidden" name="form-name" value="contact" />
                
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="interest">What is your primary interest?</label>
                    <select id="interest" name="interest">
                        <option value="web-dev">Web Development</option>
                        <option value="design">Design</option>
                        <option value="business">Business</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Your Feedback</label>
                    <textarea id="message" name="message" rows="4" placeholder="Tell me something..."></textarea>
                </div>

                <button type="submit" class="btn">Submit Data</button>
            </form>
            <div id="response-msg" style="margin-top: 15px; color: #2563eb; font-weight: bold;"></div>
        </section>
    </main>

    <footer>
        <p style="text-align: center; padding: 20px;">&copy; 2026 My Personal Site</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
